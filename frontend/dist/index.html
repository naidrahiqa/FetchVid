<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FetchVid</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --bg-primary: #0f0f13;
      --bg-secondary: #1a1a23;
      --bg-tertiary: #252533;
      --text-primary: #e8e8ed;
      --text-secondary: #8b8ba0;
      --accent: #6c5ce7;
      --accent-hover: #7f6ff0;
      --success: #00b894;
      --error: #d63031;
      --warning: #fdcb6e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    #app { display: flex; flex-direction: column; height: 100vh; padding: 12px; gap: 10px; }
    .top-bar { display: flex; gap: 8px; align-items: center; }
    .top-bar h1 { font-size: 16px; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .top-bar input {
      flex: 1; padding: 6px 12px; border-radius: 8px;
      background: var(--bg-secondary); border: 1px solid var(--bg-tertiary);
      color: var(--text-primary); font-size: 13px; outline: none;
    }
    .top-bar input:focus { border-color: var(--accent); }
    .icon-btn {
      padding: 6px 10px; border-radius: 8px; border: none;
      background: var(--bg-secondary); color: var(--text-primary);
      font-size: 16px; cursor: pointer; transition: background 0.15s;
    }
    .icon-btn:hover { background: var(--bg-tertiary); }
    .tabs { display: flex; gap: 4px; align-items: center; }
    .tab {
      padding: 5px 16px; border-radius: 8px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer;
      background: var(--bg-secondary); color: var(--text-secondary);
      transition: all 0.15s;
    }
    .tab:hover { background: var(--bg-tertiary); }
    .tab.active { background: var(--accent); color: #fff; }
    .btn {
      padding: 5px 16px; border-radius: 8px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: var(--bg-secondary); color: var(--text-secondary); }
    .btn-secondary:hover { background: var(--bg-tertiary); }
    .btn-link {
      background: none; border: none; padding: 0;
      font-size: 12px; cursor: pointer; color: var(--accent);
    }
    .btn-link:hover { text-decoration: underline; }
    .btn-link.danger { color: var(--error); }
    .btn-link.muted { color: var(--text-secondary); }
    .video-panel {
      flex: 1; display: flex; flex-direction: column; border-radius: 12px;
      background: var(--bg-secondary); padding: 10px; gap: 8px;
      min-height: 0; overflow: hidden;
    }
    .video-header { display: flex; justify-content: space-between; align-items: center; }
    .video-header span { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
    .video-header .actions { display: flex; gap: 10px; }
    #videoList { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
    .video-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 6px; cursor: pointer;
      transition: background 0.1s;
    }
    .video-item:hover { background: var(--bg-tertiary); }
    .video-item input[type="checkbox"] { accent-color: var(--accent); }
    .video-item .title { font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge {
      font-size: 10px; padding: 1px 6px; border-radius: 4px;
      font-weight: 600; white-space: nowrap;
    }
    .download-bar { display: flex; align-items: center; gap: 10px; }
    .download-bar label { font-size: 12px; color: var(--text-secondary); }
    .download-bar input {
      width: 48px; padding: 4px 6px; border-radius: 6px;
      background: var(--bg-secondary); border: 1px solid var(--bg-tertiary);
      color: var(--text-primary); font-size: 12px; text-align: center; outline: none;
    }
    #btnDownload {
      margin-left: auto; padding: 8px 24px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff; font-size: 13px;
      font-weight: 700; cursor: pointer; transition: all 0.15s;
    }
    #btnDownload:hover { background: var(--accent-hover); }
    #btnDownload:disabled { opacity: 0.4; cursor: not-allowed; }
    #progressContainer { display: none; }
    #progressContainer.show { display: block; }
    .progress-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .progress-header span { font-size: 12px; color: var(--text-secondary); }
    .progress-track {
      height: 8px; border-radius: 4px; background: var(--bg-tertiary); overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 4px; background: var(--accent);
      transition: width 0.3s ease; width: 0%;
    }
    #log {
      height: 120px; border-radius: 12px; background: var(--bg-secondary);
      overflow-y: auto; font-size: 11px; font-family: 'Cascadia Code', 'Fira Code', monospace;
      padding: 8px; display: flex; flex-direction: column; gap: 1px;
    }
    #log .log-line { color: var(--text-secondary); line-height: 1.5; }
    #log .log-line.success { color: var(--success); }
    #log .log-line.error { color: var(--error); }
    #log .log-line.warning { color: var(--warning); }
    #log .log-line.info { color: var(--accent); }
    .empty-state {
      text-align: center; color: var(--text-secondary);
      font-size: 12px; padding: 32px 0;
    }
  </style>
  <script src="main.js" type="module"></script>
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <div class="top-bar">
      <h1>FetchVid</h1>
      <input id="urlInput" type="text" placeholder="Paste URL profile / share link..." />
      <button id="btnFolder" class="icon-btn" title="Pilih folder">📂</button>
      <button id="btnCookies" class="icon-btn" title="Pilih cookies file">🍪</button>
    </div>

    <!-- Platform Tabs -->
    <div class="tabs">
      <button class="tab active" data-platform="facebook">FB</button>
      <button class="tab" data-platform="instagram">IG</button>
      <button class="tab" data-platform="tiktok">TT</button>
      <button id="btnExtract" class="btn btn-primary" style="margin-left:auto">Ambil Daftar Video</button>
      <button id="btnScripts" class="btn btn-secondary">Scripts</button>
    </div>

    <!-- Video List -->
    <div class="video-panel">
      <div class="video-header">
        <span>Daftar Video: <strong id="count">0</strong></span>
        <div class="actions">
          <button id="btnSelectAll" class="btn-link">Select All</button>
          <button id="btnDeselect" class="btn-link muted">Deselect</button>
          <button id="btnPaste" class="btn-link">Paste URLs</button>
          <button id="btnClear" class="btn-link danger">Clear</button>
        </div>
      </div>
      <div id="videoList">
        <div class="empty-state">Belum ada video. Paste URL atau klik "Ambil Daftar Video"</div>
      </div>
    </div>

    <!-- Download Controls -->
    <div class="download-bar">
      <label>Download bareng:</label>
      <input id="concurrent" type="number" value="3" min="1" max="10" />
      <label>reel sekaligus</label>
      <button id="btnDownload" disabled>DOWNLOAD VIDEO</button>
    </div>

    <!-- Progress -->
    <div id="progressContainer">
      <div class="progress-header">
        <span id="progressText">0 / 0</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-track">
        <div id="progressBar" class="progress-fill"></div>
      </div>
    </div>

    <!-- Log -->
    <div id="log">
      <div class="log-line">FetchVid siap. Masukkan URL profile untuk memulai.</div>
    </div>
  </div>
</body>
</html>
